<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lutèce Executive</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:#1a1a1a;background:#f5f4f0;min-height:100vh;}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;}
.login-box{background:#fff;border:1px solid #e8e7e1;border-radius:16px;padding:2.5rem 2rem;width:100%;max-width:380px;border-top:4px solid #203b77;}
.login-logo{font-size:16px;font-weight:700;margin-bottom:.25rem;}
.login-sub{font-size:12px;color:#888;margin-bottom:2rem;}
.login-err{background:#fce8e8;color:#791f1f;border-radius:8px;padding:.6rem .9rem;font-size:13px;margin-bottom:1rem;display:none;}
.app{display:flex;min-height:100vh;}
.sidebar{width:220px;min-width:220px;border-right:1px solid #dce3f0;padding:1.25rem 1rem;background:#f0f3f9;position:fixed;top:0;left:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column;}
.main{margin-left:220px;padding:1.75rem 2.5rem;width:calc(100% - 220px);}
.logo{font-size:13px;font-weight:700;margin-bottom:1.5rem;padding:0 4px;}
.logo small{display:block;font-size:11px;font-weight:400;color:#888;margin-top:2px;}
.nav-section{font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:.07em;margin:0 0 .4rem;padding:0 4px;}
.nav-group{margin-bottom:1.25rem;}
.ni{padding:7px 10px;border-radius:8px;cursor:pointer;font-size:13px;color:#666;margin-bottom:2px;display:flex;align-items:center;gap:8px;user-select:none;}
.ni.on{background:#fff;color:#203b77;font-weight:600;border:1px solid #dce3f0;border-left:3px solid #eb710b;}
.ni:hover:not(.on){background:rgba(255,255,255,.7);}
.sidebar-footer{margin-top:auto;padding-top:1rem;border-top:1px solid #dce3f0;}
.user-pill{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:8px;margin-bottom:4px;}
.user-av{width:28px;height:28px;border-radius:50%;background:#203b77;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;}
.user-info{flex:1;min-width:0;}
.user-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.user-email{font-size:10px;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.logout-btn{font-size:11px;color:#888;cursor:pointer;padding:2px 8px;background:none;border:none;font-family:inherit;}
.logout-btn:hover{color:#1a1a1a;}
.card{background:#fff;border:1px solid #e8e7e1;border-radius:12px;padding:1rem 1.25rem;margin-bottom:10px;cursor:pointer;transition:border-color .15s,box-shadow .15s;}
.card:hover{border-color:#203b77;box-shadow:0 0 0 1px #e8edf5;}
.av{width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;}
.av-b{background:#deedfb;color:#0c447c;} .av-t{background:#d5f0e7;color:#085041;} .av-a{background:#faeeda;color:#633806;}
.cav{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;background:#eeedfe;color:#3c3489;flex-shrink:0;}
.bdg{display:inline-flex;align-items:center;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500;}
.b-ok{background:#e8f3d8;color:#27500a;} .b-go{background:#faeeda;color:#633806;} .b-no{background:#fce8e8;color:#791f1f;} .b-bl{background:#e8edf5;color:#203b77;} .b-gy{background:#f0efe8;color:#444441;}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:8px;border:1px solid #d5d4ce;background:transparent;color:#1a1a1a;font-size:12px;cursor:pointer;font-family:inherit;}
.btn:hover{background:#f0efe8;}
.btn-p{background:#203b77;color:#fff;border-color:#203b77;}
.btn-p:hover{background:#172c5a;}
.btn-d{background:#fce8e8;color:#791f1f;border-color:#f0c0c0;}
.tbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;}
.ptitle{font-size:18px;font-weight:600;color:#203b77;}
.panel{background:#fff;border:1px solid #e8e7e1;border-radius:12px;padding:1.5rem;margin-bottom:1rem;}
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.25rem;padding-bottom:1rem;border-bottom:1px solid #f0efe8;}
.fr{display:flex;align-items:baseline;gap:8px;padding:7px 0;border-bottom:1px solid #f4f3ef;font-size:13px;}
.fl{color:#888;width:175px;min-width:175px;}
.st{font-size:12px;font-weight:600;margin:1.25rem 0 .7rem;color:#203b77;text-transform:uppercase;letter-spacing:.04em;opacity:.7;}
.cr{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #f4f3ef;}
.oi{border:1px solid #e8e7e1;border-radius:8px;padding:10px 14px;margin-bottom:8px;cursor:pointer;}
.oi:hover{border-color:#bbb;}
.om{display:flex;gap:12px;font-size:12px;color:#888;flex-wrap:wrap;margin-top:5px;}
.met{background:#f5f4f0;border-radius:8px;padding:.8rem 1rem;}
.ml{font-size:11px;color:#888;margin-bottom:4px;}
.mv{font-size:20px;font-weight:600;}
.mv-g{color:#27500a;} .mv-r{color:#791f1f;}
.msub{font-size:11px;color:#aaa;margin-top:4px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px;}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:12px;}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:12px;}
.yr-lbl{font-size:14px;font-weight:600;padding:.6rem 0;border-bottom:2px solid #e8edf5;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;margin-top:.5rem;color:#203b77;}
.yr-arr{font-size:12px;color:#aaa;transition:transform .2s;}
.yr-arr.open{transform:rotate(180deg);}
.grp-lbl{font-size:11px;font-weight:600;color:#eb710b;text-transform:uppercase;letter-spacing:.07em;margin:1rem 0 .4rem;padding-left:2px;}
.bc{display:flex;align-items:center;gap:6px;margin-bottom:1.25rem;}
.fp{background:#fff;border:1px solid #e8e7e1;border-radius:12px;padding:1.5rem;max-width:600px;}
.ft{font-size:16px;font-weight:600;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid #f0efe8;}
.fg{margin-bottom:1.1rem;}
.fg label{display:block;font-size:12px;color:#888;margin-bottom:5px;font-weight:500;}
.fg input,.fg select{width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#1a1a1a;font-family:inherit;font-size:13px;}
.fg input:focus,.fg select:focus{outline:none;border-color:#888;}
.fg input[readonly]{background:#f5f4f0;color:#888;}
.fg input:disabled{background:#f5f4f0;color:#aaa;}
.fhint{font-size:11px;color:#aaa;margin-top:4px;}
.fdiv{height:1px;background:#f0efe8;margin:1.25rem 0;}
.fsec{font-size:10px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:.07em;margin-bottom:1rem;}
.seg{display:flex;border:1px solid #ddd;border-radius:8px;overflow:hidden;}
.sb2{flex:1;padding:8px;text-align:center;font-size:13px;cursor:pointer;background:transparent;border:none;color:#888;font-family:inherit;}
.sb2.on{background:#fef3e8;color:#eb710b;font-weight:600;border-bottom:2px solid #eb710b;}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.kbar{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:1rem;}
.kb{background:#f5f4f0;border-radius:8px;padding:.65rem .9rem;}
.kl{font-size:11px;color:#888;margin-bottom:3px;}
.kv{font-size:16px;font-weight:600;}
.kv-g{color:#27500a;}
.fbr{display:flex;gap:8px;margin-top:1.5rem;padding-top:1rem;border-top:1px solid #f0efe8;flex-wrap:wrap;}
.nsb{background:#f5f4f0;border-radius:8px;padding:1rem;margin-top:8px;border:1px solid #e8e7e1;}
.tgl{font-size:12px;color:#3b82f6;cursor:pointer;margin-top:5px;display:inline-block;}
.ibox{background:#f5f4f0;border-radius:8px;padding:.75rem 1rem;margin-bottom:1rem;font-size:13px;color:#666;}
.cname{cursor:pointer;border-bottom:1px dashed #ccc;}
.doc-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f4f3ef;font-size:13px;}
.doc-icon{width:32px;height:32px;border-radius:6px;background:#fce8e8;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.doc-upload-zone{border:1.5px dashed #ddd;border-radius:8px;padding:1.5rem;text-align:center;cursor:pointer;margin-top:.75rem;transition:border-color .15s;}
.doc-upload-zone:hover{border-color:#888;background:#f9f9f7;}
.cname:hover{color:#3b82f6;border-bottom-color:#3b82f6;}
</style>
</head>

async function sbPatch(t,id,b){var r=await fetch(SB_URL+'/rest/v1/'+t+'?id=eq.'+id,{method:'PATCH',headers:sbH(),body:JSON.stringify(b)});if(!r.ok){console.error(await r.text());return null;}var d=await r.json();return Array.isArray(d)?d[0]:d;}
async function sbDel(t,id){var r=await fetch(SB_URL+'/rest/v1/'+t+'?id=eq.'+id,{method:'DELETE',headers:sbH()});return r.ok;}

function showLoading(msg){var m=document.getElementById('main');if(m)m.innerHTML='<div style="padding:3rem;text-align:center;color:#888;">'+( msg||'Chargement...')+'</div>';}

async function loadDB(){
  showLoading('Chargement des données...');
  try{
    var socs=await sbGet('societes','select=*&order=nom');
    var contacts=await sbGet('contacts','select=*&order=nom');
    var opps=await sbGet('opportunites','select=*&order=created_at.desc');
    var docs=await sbGet('documents','select=*&order=created_at.asc');
    DB.societes=socs.map(function(s){
      var sc=contacts.filter(function(c){return c.societe_id===s.id;}).map(function(c){
        return {id:c.id,p:c.prenom,n:c.nom,fn:c.fonction||'—',tel:c.telephone||'',email:c.email||'',li:c.linkedin||'',civ:c.civilite||''};
      });
      var so=opps.filter(function(o){return o.societe_id===s.id;}).map(function(o){
        var od=docs.filter(function(d){return d.opportunite_id===o.id;}).map(function(d){
          return {id:d.id,name:d.nom,size:d.taille||0,date:d.created_at?new Date(d.created_at).toLocaleDateString('fr-FR'):'',url:d.url||''};
        });
        return {id:o.id,type:o.type,statut:o.statut,poste:o.poste||'',contact:o.contact_nom||'',associe:o.associe||'',
          d1:o.date_debut||'',d2:o.date_fin||'',tjm:o.tjm||0,cj:o.cout_journalier||0,jours:o.jours_ouvres||0,
          manager:o.manager||'',dr:o.date_recherche||'',hon:o.honoraire||0,salaire:o.salaire||0,candidat:o.candidat||'',source_candidat:o.source_candidat||'',raison_echec:o.raison_echec||'',docs:od};
      });
      var colors=['av-b','av-t','av-a'];
      return {id:s.id,nom:s.nom,secteur:s.secteur||'',site:s.site||'',adresse:s.adresse||'',associe:s.associe||'',
        av:(s.nom||'??').substring(0,2).toUpperCase(),avc:colors[s.nom.charCodeAt(0)%3],contacts:sc,opps:so};
    });
    render();
  }catch(e){console.error(e);showLoading('Erreur de connexion. Vérifiez votre réseau.');}
}

var USERS=[{email:"guillaume.alonso@lutece-executive.fr",pwd:"LuteceCRM2026!",prenom:"Guillaume",initiales:"G"}];

  var email=document.getElementById("li-email").value.trim().toLowerCase();

  var user=null;
  for(var i=0;i<USERS.length;i++){

function cm(o){var ca=(o.tjm||0)*(o.jours||0),co=(o.cj||0)*(o.jours||0),m=ca-co,t=ca>0?Math.round(m/ca*100):0;return{ca:ca,co:co,m:m,t:t};}
function fmt(n){return Math.round(n).toLocaleString("fr-FR");}
function fd(s){return s?s.split("-").reverse().join("/"):"—";}
function bclass(s){
  if(s==="Recherche en cours")return "b-gy";
  if(s==="Mission en cours")return "b-go";
  if(s==="Mission terminée")return "b-ok";
  if(s==="Succes"||s==="Gagné")return "b-ok";
  if(s==="Echec"||s==="Perdu")return "b-no";
  if(s==="En cours")return "b-go";
  return "b-gy";
}
function blabel(s){
  if(s==="Succes"||s==="Gagné")return "Gagné";
  if(s==="Echec"||s==="Perdu")return "Perdu";
  if(s==="Recherche en cours")return "Recherche en cours";
  if(s==="Mission en cours")return "Mission en cours";
  if(s==="Mission terminée")return "Mission terminée";
  return s;
}
function oy(o){var d=o.d1||o.dr||"";return d?parseInt(d.split("-")[0]):CY;}
function isWD(d){return d.getDay()!==0&&d.getDay()!==6;}
function cWD(d1,d2){var c=0,cur=new Date(d1);cur.setHours(0,0,0,0);var e=new Date(d2);e.setHours(0,0,0,0);while(cur<=e){if(isWD(cur))c++;cur.setDate(cur.getDate()+1);}return c;}
function getSoc(id){for(var i=0;i<DB.societes.length;i++){for(var j=0;j<DB.societes[i].opps.length;j++){if(DB.societes[i].opps[j].id===id)return DB.societes[i];}}return null;}
function getOpp(id){for(var i=0;i<DB.societes.length;i++){for(var j=0;j<DB.societes[i].opps.length;j++){if(DB.societes[i].opps[j].id===id)return DB.societes[i].opps[j];}}return null;}
function socById(id){return DB.societes.find(function(s){return s.id===id;});}

function vDB(m){
  var tca=0,tcaM=0,tmM=0,tmC=0,nOk=0,nKo=0,nGo=0,nMGo=0,nCGo=0,nMOk=0,nCOk=0,nMKo=0,nCKo=0;
  var det=[];
  DB.societes.forEach(function(s){
    var cs=0,ms=0,cr=0;
    s.opps.forEach(function(o){
      if(oy(o)!==CY)return;
      // Compteurs dashboard - oy(o) est déjà filtré pour CY par le if au-dessus
      // Gagné : missions actives/terminées + CDI gagnés
      if(o.type==="Mission"&&(o.statut==="Mission en cours"||o.statut==="Mission terminée"||o.statut==="En cours"||o.statut==="Succes")){nOk++;nMOk++;}
      else if(o.type==="CDI"&&(o.statut==="Gagné"||o.statut==="Succes")){nOk++;nCOk++;}
      // En cours : missions "Mission en cours" + CDI "Recherche en cours"
      if(o.type==="Mission"&&(o.statut==="Mission en cours"||o.statut==="En cours")){nGo++;nMGo++;}
      else if(o.type==="CDI"&&(o.statut==="Recherche en cours"||o.statut==="En cours")){nGo++;nCGo++;}
      else if(o.statut==="Echec"||o.statut==="Perdu"){nKo++;if(o.type==="Mission")nMKo++;else nCKo++;}
      else if(o.statut==="Mission en cours"||o.statut==="En cours"||o.statut==="Recherche en cours"){nGo++;if(o.type==="Mission")nMGo++;else nCGo++;}
      if(o.type==="Mission"&&o.statut!=="Recherche en cours"){var r=cm(o);tca+=r.ca;tcaM+=r.ca;tmM+=r.m;cs+=r.ca;ms+=r.m;}
      else if(o.type==="CDI"&&(o.statut==="Succes"||o.statut==="Gagné")&&o.hon>0){tca+=o.hon;tmC+=o.hon;cs+=o.hon;cr+=o.hon;}
    });
    if(cs>0)det.push({s:s,ca:cs,m:ms,cr:cr});
  });
  var tmT=tmM+tmC;
  var tjmSum=0,tjmCount=0,salSum=0,salCount=0;
  DB.societes.forEach(function(s){
    s.opps.forEach(function(o){
      if(o.type==="Mission"&&(o.statut==="Mission en cours"||o.statut==="Mission terminée"||o.statut==="En cours"||o.statut==="Succes")&&o.tjm>0){tjmSum+=o.tjm;tjmCount++;}
      if(o.type==="CDI"&&(o.statut==="Succes"||o.statut==="Gagné")&&o.salaire>0){salSum+=o.salaire;salCount++;}
    });
  });
  var tjmMoyen=tjmCount>0?Math.round(tjmSum/tjmCount):0;
  var salMoyen=salCount>0?Math.round(salSum/salCount):0;
  var pM=tmT>0?Math.round(tmM/tmT*100):0;
  var pC=tmT>0?Math.round(tmC/tmT*100):0;
  var txG=tca>0?Math.round(tmT/tca*100):0;
  var txMT=tcaM>0?Math.round(tmM/tcaM*100):0;

  var h='<div class="tbar"><span class="ptitle">Tableau de bord '+CY+'</span></div>';

  // ── Encadré 1 : Financier ─────────────────────────────────────────────────
  h+='<div class="panel" style="margin-bottom:1rem;">';
  h+='<div style="font-size:12px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:.05em;margin-bottom:1rem;">Résultats financiers</div>';

  // CA + Marge totale
  h+='<div class="g2" style="margin-bottom:1.25rem;">';
  h+='<div><div class="ml">CA total généré</div><div style="font-size:28px;font-weight:700;letter-spacing:-.5px;">'+fmt(tca)+' €</div></div>';
  h+='<div><div class="ml">Marge brute totale</div><div style="font-size:28px;font-weight:700;letter-spacing:-.5px;color:#27500a;">'+fmt(tmT)+' €</div></div>';
  h+='</div>';

  // Separator
  h+='<div style="height:1px;background:#f0efe8;margin-bottom:1.25rem;"></div>';

  // Répartition marge
  h+='<div class="ml" style="margin-bottom:.6rem;">Répartition de la marge brute</div>';
  h+='<div class="g2" style="margin-bottom:1.25rem;">';
  h+='<div style="background:#f5f4f0;border-radius:8px;padding:.8rem 1rem;">';
  h+='<div class="ml">Missions de transition</div>';
  h+='<div style="font-size:18px;font-weight:600;margin:.2rem 0;">'+fmt(tmM)+' €</div>';
  h+='<div style="font-size:11px;color:#aaa;">'+pM+'% de la marge totale</div></div>';
  h+='<div style="background:#f5f4f0;border-radius:8px;padding:.8rem 1rem;">';
  h+='<div class="ml">Recrutements CDI</div>';
  h+='<div style="font-size:18px;font-weight:600;margin:.2rem 0;">'+fmt(tmC)+' €</div>';
  h+='<div style="font-size:11px;color:#aaa;">'+pC+'% de la marge totale</div></div>';
  h+='</div>';

  // Separator
  h+='<div style="height:1px;background:#f0efe8;margin-bottom:1.25rem;"></div>';

  // Taux + moyennes
  h+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;">';
  h+='<div><div class="ml">Taux de marge global</div><div style="font-size:20px;font-weight:600;">'+txG+'%</div></div>';
  h+='<div><div class="ml">Taux de marge MT</div><div style="font-size:20px;font-weight:600;">'+txMT+'%</div></div>';
  h+='<div><div class="ml">TJM moyen missions</div><div style="font-size:20px;font-weight:600;">'+(tjmMoyen>0?fmt(tjmMoyen)+' €':'—')+'</div></div>';
  h+='<div><div class="ml">Salaire moyen CDI</div><div style="font-size:20px;font-weight:600;">'+(salMoyen>0?fmt(salMoyen)+' €':'—')+'</div></div>';
  h+='</div>';
  h+='</div>';

  // ── Encadré 2 : Opportunités ──────────────────────────────────────────────
  h+='<div class="panel" style="margin-bottom:1rem;">';
  h+='<div style="font-size:12px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:.05em;margin-bottom:1rem;">Opportunités '+CY+'</div>';
  h+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem;">';

  // Gagné
  h+='<div style="border-left:3px solid #4a9e5c;padding-left:1rem;">';
  h+='<div class="ml" style="margin-bottom:.4rem;">Gagné</div>';
  h+='<div style="font-size:28px;font-weight:700;color:#27500a;">'+nOk+'</div>';
  h+='<div style="font-size:12px;color:#888;margin-top:.4rem;">Missions : '+nMOk+'</div>';
  h+='<div style="font-size:12px;color:#888;">CDI : '+nCOk+'</div>';
  h+='</div>';

  // En cours
  h+='<div style="border-left:3px solid #d4963a;padding-left:1rem;">';
  h+='<div class="ml" style="margin-bottom:.4rem;">En cours</div>';
  h+='<div style="font-size:28px;font-weight:700;color:#633806;">'+nGo+'</div>';
  h+='<div style="font-size:12px;color:#888;margin-top:.4rem;">Missions : '+nMGo+'</div>';
  h+='<div style="font-size:12px;color:#888;">CDI : '+nCGo+'</div>';
  h+='</div>';

  // Perdu
  h+='<div style="border-left:3px solid #c94a4a;padding-left:1rem;">';
  h+='<div class="ml" style="margin-bottom:.4rem;">Perdu</div>';
  h+='<div style="font-size:28px;font-weight:700;color:#791f1f;">'+nKo+'</div>';
  h+='<div style="font-size:12px;color:#888;margin-top:.4rem;">Missions : '+nMKo+'</div>';
  h+='<div style="font-size:12px;color:#888;">CDI : '+nCKo+'</div>';
  h+='</div>';

  h+='</div></div>';

  // ── Graphique camembert ───────────────────────────────────────────────────
  h+='<div class="panel" style="margin-bottom:1rem;">';
  h+='<div style="font-size:12px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:.05em;margin-bottom:1rem;">Répartition de la marge brute</div>';
  h+='<div style="display:flex;align-items:center;gap:2rem;flex-wrap:wrap;">';
  h+='<canvas id="pie-chart" width="200" height="200" style="flex-shrink:0;"></canvas>';
  h+='<div>';
  h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:.75rem;">';
  h+='<div style="width:14px;height:14px;border-radius:3px;background:#eb710b;flex-shrink:0;"></div>';
  h+='<div><div style="font-size:13px;font-weight:500;">Missions de transition</div>';
  h+='<div style="font-size:12px;color:#888;">'+fmt(tmM)+' € — '+pM+'%</div></div></div>';
  h+='<div style="display:flex;align-items:center;gap:8px;">';
  h+='<div style="width:14px;height:14px;border-radius:3px;background:#203b77;flex-shrink:0;"></div>';
  h+='<div><div style="font-size:13px;font-weight:500;">Recrutements CDI</div>';
  h+='<div style="font-size:12px;color:#888;">'+fmt(tmC)+' € — '+pC+'%</div></div></div>';
  h+='</div></div></div>';

  // ── Détail par société ────────────────────────────────────────────────────
  h+='<div class="panel"><div style="font-size:13px;font-weight:600;margin-bottom:.75rem;">Détail par société — '+CY+'</div>';
  det.forEach(function(x){
    var tx=x.ca>0?Math.round(x.m/x.ca*100):0;
    h+='<div class="fr"><span class="fl">'+x.s.nom+'</span><span style="font-size:13px;">CA : <strong>'+fmt(x.ca)+' €</strong>';
    if(x.m>0)h+=' &nbsp;·&nbsp; Marge missions : '+fmt(x.m)+' € ('+tx+'%)';
    if(x.cr>0)h+=' &nbsp;·&nbsp; Honoraires CDI : '+fmt(x.cr)+' €';
    h+='</span></div>';
  });
  if(!det.length)h+='<div style="font-size:13px;color:#888;padding:8px 0;">Aucune donnée pour '+CY+'</div>';
  h+='</div>';

  m.innerHTML=h;

  // Draw pie chart
  var canvas=document.getElementById("pie-chart");
  if(!canvas)return;
  var ctx=canvas.getContext("2d");
  var total=tmM+tmC;
  if(total===0){
    ctx.fillStyle="#f0efe8";
    ctx.beginPath();ctx.arc(100,100,90,0,2*Math.PI);ctx.fill();
    ctx.fillStyle="#aaa";ctx.font="13px sans-serif";ctx.textAlign="center";
    ctx.fillText("Aucune donnée",100,105);
    return;
  }
  var slices=[
    {val:tmM,color:"#eb710b"},
    {val:tmC,color:"#203b77"}
  ];
  var start=-(Math.PI/2);
  slices.forEach(function(sl){
    var angle=(sl.val/total)*(2*Math.PI);
    ctx.beginPath();
    ctx.moveTo(100,100);
    ctx.arc(100,100,90,start,start+angle);
    ctx.closePath();
    ctx.fillStyle=sl.color;
    ctx.fill();
    ctx.strokeStyle="#fff";
    ctx.lineWidth=2;
    ctx.stroke();
    start+=angle;
  });
  // Center hole (donut)
  ctx.beginPath();ctx.arc(100,100,45,0,2*Math.PI);
  ctx.fillStyle="#fff";ctx.fill();
  ctx.fillStyle="#1a1a1a";ctx.font="bold 14px sans-serif";ctx.textAlign="center";
  ctx.fillText(fmt(total)+" €",100,97);
  ctx.fillStyle="#888";ctx.font="11px sans-serif";
  ctx.fillText("marge totale",100,113);
}

function vOpp(m){
  var all=[];
  DB.societes.forEach(function(s){s.opps.forEach(function(o){all.push({o:o,s:s});});});
  var yrs={};
  all.forEach(function(x){var y=oy(x.o);if(!yrs[y])yrs[y]=[];yrs[y].push(x);});
  var sy=Object.keys(yrs).map(Number).sort(function(a,b){return b-a;});
  var h='<div class="tbar"><span class="ptitle">Opportunités</span><button class="btn btn-p" onclick="view=\'form_opp\';selOpp=null;render()">+ Nouvelle opportunité</button></div>';

  function card(x){
    var o=x.o,s=x.s;
    var c='<div class="oi" onclick="selectOpp(\''+o.id+'\')">';
    c+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;">';
    var cardTitle=o.poste?o.poste+' — '+s.nom:s.nom;
    c+='<div><div style="font-weight:600;font-size:13px;margin-bottom:4px;">'+cardTitle+'</div>';
    c+='<div style="display:flex;gap:5px;"><span class="bdg '+(o.type==="Mission"?'b-bl':'b-gy')+'">'+o.type+'</span>';
    c+='<span class="bdg '+bclass(o.statut)+'">'+blabel(o.statut)+'</span></div></div>';
    if(o.type==="Mission"){var r=cm(o);c+='<div style="text-align:right;"><div style="font-size:13px;font-weight:600;">'+fmt(r.ca)+' €</div><div style="font-size:11px;color:#888;">Marge '+r.t+'%</div></div>';}
    else if(o.hon>0){c+='<div style="text-align:right;"><div style="font-size:13px;font-weight:600;">'+fmt(o.hon)+' €</div><div style="font-size:11px;color:#888;">Honoraire</div></div>';}
    c+='</div>';
    if(o.type==="Mission"){
      if(o.statut==="Recherche en cours"){
        c+='<div class="om">'+(o.dr?'<span>Recherche depuis le '+fd(o.dr)+'</span>':'')+(o.contact?'<span>'+o.contact+'</span>':'')+'</div>';
      } else {
        c+='<div class="om"><span>'+fd(o.d1)+' → '+fd(o.d2)+'</span>'+(o.contact?'<span>'+o.contact+'</span>':'')+'</div>';
      }
    }
    else if(o.poste)c+='<div class="om"><span>'+o.poste+'</span></div>';
    c+='</div>';
    return c;
  }

  sy.forEach(function(y){
    var isCY=(y===CY);
    if(collapsed[y]===undefined&&!isCY)collapsed[y]=true;
    var col=collapsed[y]===true;
    var items=yrs[y];
    var mRecherche=items.filter(function(i){return i.o.type==="Mission"&&i.o.statut==="Recherche en cours";});
    var mGo=items.filter(function(i){return i.o.type==="Mission"&&(i.o.statut==="Mission en cours"||i.o.statut==="En cours");});
    var mDone=items.filter(function(i){return i.o.type==="Mission"&&(i.o.statut==="Mission terminée"||i.o.statut==="Succes");});
    var cRecherche=items.filter(function(i){return i.o.type==="CDI"&&(i.o.statut==="Recherche en cours"||i.o.statut==="En cours");});
    var cOk=items.filter(function(i){return i.o.type==="CDI"&&(i.o.statut==="Gagné"||i.o.statut==="Succes");});
    var cKo=items.filter(function(i){return i.o.type==="CDI"&&(i.o.statut==="Perdu"||i.o.statut==="Echec");});
    h+='<div class="yr-lbl" onclick="togYr('+y+')"><span>'+y+(isCY?' — année en cours':'')+'</span>';
    h+='<span class="yr-arr'+(col?'':' open')+'" id="arr-'+y+'">▼</span></div>';
    h+='<div id="yc-'+y+'" style="'+(col?'display:none;':'')+'padding-top:.25rem;">';
    if(mRecherche.length){h+='<div class="grp-lbl">Recherches en cours — Missions de transition</div>';mRecherche.forEach(function(x){h+=card(x);});}
    if(mGo.length){h+='<div class="grp-lbl">Missions en cours</div>';mGo.forEach(function(x){h+=card(x);});}
    if(cRecherche.length){h+='<div class="grp-lbl">Recherches en cours — CDI</div>';cRecherche.forEach(function(x){h+=card(x);});}
    if(mDone.length){h+='<div class="grp-lbl">Missions terminées</div>';mDone.forEach(function(x){h+=card(x);});}
    if(cOk.length){h+='<div class="grp-lbl">Placements CDI réalisés</div>';cOk.forEach(function(x){h+=card(x);});}
    if(cKo.length){h+='<div class="grp-lbl">CDI — Échec</div>';cKo.forEach(function(x){h+=card(x);});}
    h+='</div>';
  });
  m.innerHTML=h;
}

function togYr(y){
  collapsed[y]=!collapsed[y];
  var c=document.getElementById("yc-"+y),a=document.getElementById("arr-"+y);
  if(c)c.style.display=collapsed[y]?"none":"";
  if(a)a.classList.toggle("open",!collapsed[y]);
}

function uploadDoc(oppId,input){
  if(!input.files||!input.files[0])return;
  var file=input.files[0];
  var opp=getOpp(oppId);
  if(!opp)return;
  var reader=new FileReader();
  reader.onload=async function(e){
    await sbPost('documents',{opportunite_id:opp.id,nom:file.name,taille:file.size,url:e.target.result});
    await loadDB();
    selOpp=oppId;view="opp_detail";render();
  };
  reader.readAsDataURL(file);
}

async function deleteDoc(oppId,idx){
  var opp=getOpp(oppId);
  if(!opp||!opp.docs)return;
  if(!confirm("Supprimer ce document ?"))return;
  var doc=opp.docs[idx];
  if(doc&&doc.id)await sbDel('documents',doc.id);
  await loadDB();
  selOpp=oppId;view="opp_detail";render();
}

function editSt(){

function eCalc(){
  var d1=document.getElementById("eo-d1"),d2=document.getElementById("eo-d2"),ej=document.getElementById("eo-j");
  if(d1&&d2&&d1.value&&d2.value&&d2.value>=d1.value)ej.value=cWD(new Date(d1.value),new Date(d2.value));
  eCalcKpi();
}
function eCalcKpi(){
  var tj=document.getElementById("eo-tjm"),cj=document.getElementById("eo-cj"),ej=document.getElementById("eo-j");
  var t=parseFloat(tj?tj.value:0)||0,c=parseFloat(cj?cj.value:0)||0,j=parseFloat(ej?ej.value:0)||0;
  var ca=document.getElementById("eo-ca"),mg=document.getElementById("eo-mg"),tx=document.getElementById("eo-tx");
  if(!ca)return;
  if(t>0&&j>0){var CA=Math.round(t*j),M=Math.round((t-c)*j),T=CA>0?Math.round(M/CA*100):0;ca.textContent=fmt(CA)+' €';mg.textContent=fmt(M)+' €';tx.textContent=T+'%';}
}

  if(o.type==="Mission"){
    var posteM=document.getElementById("eo-poste");

    if(d2&&d2.value)body.date_fin=d2.value;
    if(tj&&tj.value)body.tjm=parseFloat(tj.value);
    if(cj&&cj.value)body.cout_journalier=parseFloat(cj.value);
    if(ej&&ej.value)body.jours_ouvres=parseInt(ej.value);
  } else {
    var poste=document.getElementById("eo-poste");
    var hon=document.getElementById("eo-hon");
    var sal=document.getElementById("eo-sal");
    var src=document.getElementById("eo-source");
    var raison=document.getElementById("eo-raison");
    if(poste)body.poste=poste.value;
    if(body.statut==="Gagné"){
      if(!hon||!hon.value||parseFloat(hon.value)<=0){alert("L'honoraire perçu est obligatoire pour un placement CDI réussi.");return;}
      body.honoraire=parseFloat(hon.value);
    } else if(hon&&hon.value!==""){body.honoraire=parseFloat(hon.value)||0;}
    if(sal&&sal.value)body.salaire=parseFloat(sal.value)||0;
    if(src&&src.value)body.source_candidat=src.value;
    if(raison&&raison.value)body.raison_echec=raison.value;
  }
  await sbPatch('opportunites',o.id,body);
  await loadDB();
  view="opp_detail";render();
}

  var asso=document.getElementById("fo-asso")?document.getElementById("fo-asso").value:"Guillaume Alonso";
  var drEl=document.getElementById("fo-dr");
  var body={societe_id:s.id,type:fType,statut:st,associe:asso,
    contact_nom:document.getElementById("fo-ct")?document.getElementById("fo-ct").value:"",
    date_recherche:drEl?drEl.value:null};
  if(fType==="Mission"){
    var pm=document.getElementById("fo-poste-m");
    var d1El=document.getElementById("fo-d1");
    var d2El=document.getElementById("fo-d2");
    var tjmEl=document.getElementById("fo-tjm");
    var cjEl=document.getElementById("fo-cj");
    var fjEl=document.getElementById("fo-j");
    var fpEl=document.getElementById("fp-inp");
    body.poste=pm?pm.value:"";
    body.date_debut=d1El&&d1El.value?d1El.value:null;
    body.date_fin=d2El&&d2El.value?d2El.value:null;
    body.tjm=tjmEl&&tjmEl.value?parseFloat(tjmEl.value):0;
    body.cout_journalier=cjEl&&cjEl.value?parseFloat(cjEl.value):0;
    body.jours_ouvres=fjEl&&fjEl.value?parseInt(fjEl.value):0;
    body.manager=(st==="Mission en cours"||st==="Mission terminée")&&fpEl?fpEl.value:"";
  } else {
    var fp=document.getElementById("fo-poste");
    body.poste=fp?fp.value:"";
    var honEl=document.getElementById("fo-hon");
    if(st==="Gagné"&&(!honEl||!honEl.value||parseFloat(honEl.value)<=0)){alert("L'honoraire perçu est obligatoire.");return;}
    body.honoraire=honEl?parseFloat(honEl.value)||0:0;
    body.salaire=parseFloat(document.getElementById("fo-sal").value)||0;
    body.candidat=(st==="Gagné"||st==="Succes")?(document.getElementById("fp-inp").value||""):"";
    var srcEl=document.getElementById("fo-source");
    var raisonEl=document.getElementById("fo-raison");
    if(srcEl&&srcEl.value)body.source_candidat=srcEl.value;
    if(raisonEl&&raisonEl.value)body.raison_echec=raisonEl.value;
  }
  try{
    var newOpp=await sbPost('opportunites',body);
    if(!newOpp){return;}
    await loadDB();
    selOpp=newOpp.id;view="opp_detail";render();
  }catch(e){alert('Erreur: '+e.message);}
}

// Restore session on page load
(function(){
  var saved=null;
  try{saved=JSON.parse(localStorage.getItem('crm_user'));}catch(e){}
  if(saved){
    currentUser=saved;
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app-screen').style.display='block';
    loadDB();
  }
})();
</script>
</body>
</html>
